<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <title>IdleShop Category</title> -->
    <link rel="stylesheet" href="../Shop/shopstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <!-- JS Scripts -->
    <script src="shopinclude.js"></script>

    <!-- Navbar -->
    <div id="nav-placeholder"></div>

    <!-- Product -->
    <script src="product.js"></script>

    <section class="group-hero fade-slide-bottom">
        <section class="container pt-4 mb-5 text-center"> 
            
            <h2 class="hover-title mb-3" id="category-title">Category</h2>
    
            <div class="floating-sort-menu">
                <div class="d-flex flex-column gap-2">
                    <button class="btn btn-dark shadow-lg" id="sort-date-btn" onclick="toggleSort('date')">
                         Newest ↓
                    </button>
                    <button class="btn btn-dark shadow-lg" id="sort-price-btn" onclick="toggleSort('price')">
                         Price ↓
                    </button>
                    <button class="btn btn-danger shadow-lg" id="clear-sort-btn" onclick="clearSort()">
                         Clear
                    </button>
                </div>
            </div>
            
            <div class="row g-4 text-start" id="category-container">
                </div>
        </section> 
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>
    
</body>
</html>
