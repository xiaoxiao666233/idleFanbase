<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Shop/shopstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <!-- JS Scripts -->
    <script src="shopinclude.js"></script>

    <!-- Navbar -->
    <div id="nav-placeholder"></div>

    <!-- Product -->
    <script src="product.js"></script>
    
    <div id="nav-placeholder"></div>

    <main class="container my-5 pt-5" id="product-detail-content">
        <div class="row g-5">
            <div class="col-md-6">
                <div class="main-img-container mb-3">
                    <img src="" id="main-product-img" class="img-fluid rounded">
                </div>
                <div class="thumbnail-row d-flex gap-2" id="p-thumbnails">
                    </div>
            </div>
    
            <div class="col-md-6">
                <h1 class="display-5 fw-bold" id="p-name">Loading...</h1>
                <p class="lead text-muted" id="p-description"></p>
                <h3 class="text-primary mb-4" id="p-price"></h3>
    
                <div class="mb-4">
                    <h5>Select Version:</h5>
                    <div class="btn-group" role="group" id="p-versions">
                        </div>
                </div>
    
                <div class="d-grid gap-3 d-md-flex">
                    <button class="btn btn-outline-dark btn-lg px-5" onclick="addToCart(true)">Add to Cart</button>
                    
                    <button class="btn btn-dark btn-lg px-5" onclick="buyNow()">Buy Now</button>
                </div>
            </div>
        </div>

        <hr class="my-5">
    <section class="container mb-5">
        <h4 class="mb-4 text-center">You May Also Like</h4>
        <div class="row g-4" id="suggested-products-container">
            </div>
    </section>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>
</body>
</html>
